name: Daily Update by 22f1001401@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '30 2 * * *'  # Runs daily at 2:30 AM UTC
  workflow_dispatch:  # Allows manual testing

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create daily timestamp by 22f1001401@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u)" > UPDATE_LOG.txt

      - name: Commit and push changes
        run: |
          git config user.name "Daily Bot"
          git config user.email "22f1001401@ds.study.iitm.ac.in"
          git add UPDATE_LOG.txt
          git commit -m "Daily automated update: $(date -u)"
          git push
