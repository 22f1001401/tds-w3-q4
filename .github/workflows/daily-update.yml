name: Daily Update by 22f1001401@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Full history

      - name: Create daily timestamp by 22f1001401@ds.study.iitm.ac.in
        run: |
          echo "Last updated: $(date -u) UTC" > UPDATE_LOG.txt
          cat UPDATE_LOG.txt  # Debug: show file content

      - name: Commit and push changes
        run: |
          git config user.name "Daily Bot"
          git config user.email "22f1001401@ds.study.iitm.ac.in"
          git add UPDATE_LOG.txt
          git commit -m "Daily automated update: $(date -u)" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
